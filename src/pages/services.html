{% extends "layouts/_base.njk" %}
{% set title = "Наши услуги | Центр микрохирургии глаза PROзрение" %}

{% block content %}
    <main>
        <section class="section page-header" style="background-color: var(--color-secondary); padding: 60px 0; text-align: center;">
            <div class="container">
                <h1 class="hero-title" style="margin-bottom: 0;">Наши услуги</h1>
            </div>
        </section>

        <section class="section">
            <div class="container">
                <div class="services-grid">
                    {% from "components/_service-card.njk" import serviceCard %}
                    {% for service in services %}
                        {{ serviceCard(service) }}
                    {% endfor %}
                </div>
            </div>
        </section>
    </main>
{% endblock %}
